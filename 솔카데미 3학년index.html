<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>중화 적정 가상 실험</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #eef2f7, #d9e4f5);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .input-group {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      align-items: center;
    }

    .input-group label {
      flex: 1;
      text-align: left;
      font-weight: 500;
    }

    .input-group input {
      flex: 2;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #357abd;
    }

    .chart-container {
      margin-top: 30px;
    }

    .result-box {
      margin-top: 20px;
      padding: 10px;
      background: #f4f7fb;
      border-radius: 10px;
      text-align: center;
      font-size: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🧪 중화 적정 가상 실험</h2>

  <div class="input-group">
    <label>산 농도 (M)</label>
    <input type="number" id="acidConc" value="0.1" step="0.01">
  </div>

  <div class="input-group">
    <label>산 부피 (mL)</label>
    <input type="number" id="acidVol" value="50">
  </div>

  <div class="input-group">
    <label>염기 농도 (M)</label>
    <input type="number" id="baseConc" value="0.1" step="0.01">
  </div>

  <button onclick="simulate()">실험 시작</button>

  <div class="result-box" id="result">
    👉 결과가 여기에 표시됩니다
  </div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
let chart;

function simulate() {
  const acidConc = parseFloat(document.getElementById("acidConc").value);
  const acidVol = parseFloat(document.getElementById("acidVol").value);
  const baseConc = parseFloat(document.getElementById("baseConc").value);

  const acidMol = acidConc * (acidVol / 1000);

  let volumes = [];
  let pHvalues = [];

  let equivalencePoint = (acidMol / baseConc) * 1000;

  for (let v = 0; v <= 100; v += 1) {
    let baseMol = baseConc * (v / 1000);
    let totalVol = (acidVol + v) / 1000;

    let pH;

    if (baseMol < acidMol) {
      let H = (acidMol - baseMol) / totalVol;
      pH = -Math.log10(H);
    } else if (Math.abs(baseMol - acidMol) < 1e-6) {
      pH = 7;
    } else {
      let OH = (baseMol - acidMol) / totalVol;
      let pOH = -Math.log10(OH);
      pH = 14 - pOH;
    }

    // 약간의 오차 추가 (실험 느낌)
    pH += (Math.random() - 0.5) * 0.1;

    volumes.push(v);
    pHvalues.push(pH);
  }

  drawChart(volumes, pHvalues);

  document.getElementById("result").innerHTML =
    `📊 예상 당량점: <b>${equivalencePoint.toFixed(2)} mL</b>`;
}

function drawChart(volumes, pHvalues) {
  const ctx = document.getElementById("chart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: volumes,
      datasets: [{
        label: 'pH 변화',
        data: pHvalues,
        fill: false,
        tension: 0.2
      }]
    },
    options: {
      animation: {
        duration: 1000
      },
      scales: {
        x: {
          title: {
            display: true,
            text: '염기 부피 (mL)'
          }
        },
        y: {
          title: {
            display: true,
            text: 'pH'
          },
          min: 0,
          max: 14
        }
      }
    }
  });
}
</script>

</body>
</html>
